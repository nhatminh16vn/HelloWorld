
<!DOCTYPE html>
<html>
<head>
  <title>Baldi PRO</title>
  <style>
    body { margin:0; overflow:hidden; }
    canvas { display:block; background:#111; }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== PLAYER =====
let player = { x:2, y:2, angle:0, stamina:100 };

// ===== MAP (RANDOM GENERATOR) =====
let mapSize = 10;
let map = [];

for (let y=0;y<mapSize;y++){
  let row=[];
  for (let x=0;x<mapSize;x++){
    if (Math.random()<0.2 || x==0||y==0||x==mapSize-1||y==mapSize-1){
      row.push(1); // wall
    } else {
      row.push(0); // empty
    }
  }
  map.push(row);
}

// place notebook + exit
map[8][8]=2; // notebook
map[1][8]=3; // exit

// ===== ENEMIES =====
let baldi = {x:7,y:7};
let principal = {x:5,y:5, anger:0};

// ===== CONTROLS =====
let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// ===== MATH SYSTEM =====
function askMath(){
  let a = Math.floor(Math.random()*10);
  let b = Math.floor(Math.random()*10);
  let ans = prompt(a + " + " + b + " = ?");
  if (parseInt(ans) === a+b){
    alert("Correct!");
  } else {
    alert("Wrong! Baldi is faster now!");
    baldi.speed = 0.1 + Math.random()*0.2;
  }
}

// ===== MOVE =====
function move(){
  let speed = 0.05;

  if (keys["Shift"] && player.stamina>0){
    speed=0.1;
    player.stamina-=0.5;

    // PRINCIPAL PUNISH
    principal.anger += 0.05;
  } else {
    player.stamina+=0.2;
  }

  if (keys["ArrowLeft"]) player.angle -= 0.05;
  if (keys["ArrowRight"]) player.angle += 0.05;

  let nx = player.x;
  let ny = player.y;

  if (keys["ArrowUp"]){
    nx += Math.cos(player.angle)*speed;
    ny += Math.sin(player.angle)*speed;
  }

  if (keys["ArrowDown"]){
    nx -= Math.cos(player.angle)*speed;
    ny -= Math.sin(player.angle)*speed;
  }

  if (map[Math.floor(ny)][Math.floor(nx)] !== 1){
    player.x = nx;
    player.y = ny;
  }
}

// ===== ENEMIES =====
function updateEnemies(){
  // BALDI CHASE
  let dx = player.x - baldi.x;
  let dy = player.y - baldi.y;
  let dist = Math.hypot(dx,dy);

  baldi.x += dx * 0.01;
  baldi.y += dy * 0.01;

  if (dist < 0.5){
    alert("Baldi caught you!");
    location.reload();
  }

  // PRINCIPAL
  let pdx = player.x - principal.x;
  let pdy = player.y - principal.y;

  principal.x += pdx * 0.01;
  principal.y += pdy * 0.01;

  if (principal.anger > 3){
    alert("No running in the halls!");
    player.stamina = 0;
    principal.anger = 0;
  }
}

// ===== INTERACTIONS =====
function checkTile(){
  let tile = map[Math.floor(player.y)][Math.floor(player.x)];

  if (tile === 2){
    askMath();
    map[Math.floor(player.y)][Math.floor(player.x)] = 0;
  }

  if (tile === 3){
    alert("YOU ESCAPED SCHOOL!");
    location.reload();
  }
}

// ===== FAKE 3D (RAYCASTING) =====
function draw3D(){
  let rays = 120;

  for (let i=0;i<rays;i++){
    let angle = player.angle - 0.5 + (i/rays);

    for (let d=0; d<10; d+=0.05){
      let x = player.x + Math.cos(angle)*d;
      let y = player.y + Math.sin(angle)*d;

      if (map[Math.floor(y)][Math.floor(x)] === 1){
        let height = 300/(d);
        ctx.fillStyle="white";
        ctx.fillRect(i*(canvas.width/rays),
                     canvas.height/2-height/2,
                     canvas.width/rays,
                     height);
        break;
      }
    }
  }
}

// ===== UI =====
function drawUI(){
  ctx.fillStyle="green";
  ctx.fillRect(20,20,player.stamina*2,10);

  ctx.fillStyle="white";
  ctx.fillText("Stamina",20,50);
}

// ===== LOOP =====
function loop(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  move();
  updateEnemies();
  checkTile();
  draw3D();
  drawUI();

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
